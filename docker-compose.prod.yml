version: "3.9"

# Production compose — no bind mounts, env vars injected from Railway/host.
# Each service is deployed as a separate Railway service pointing at the same repo.
#
# Local prod test: docker compose -f docker-compose.prod.yml up --build

services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
      LLM_QUALITY_MODEL: ${LLM_QUALITY_MODEL:-llama-3.1-8b-instant}
      GROQ_API_KEY: ${GROQ_API_KEY}
    restart: unless-stopped

  worker:
    build:
      context: ./worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SEC_USER_AGENT: ${SEC_USER_AGENT}
      NEWS_INTERVAL_MINUTES: ${NEWS_INTERVAL_MINUTES:-30}
      FILINGS_HOUR_UTC: ${FILINGS_HOUR_UTC:-22}
      COMPANIES_HOUR_UTC: ${COMPANIES_HOUR_UTC:-20}
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=2
      -O fair
      -Q realtime,daily,batch,default
    restart: unless-stopped

  beat:
    build:
      context: ./worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SEC_USER_AGENT: ${SEC_USER_AGENT}
      NEWS_INTERVAL_MINUTES: ${NEWS_INTERVAL_MINUTES:-30}
      FILINGS_HOUR_UTC: ${FILINGS_HOUR_UTC:-22}
      COMPANIES_HOUR_UTC: ${COMPANIES_HOUR_UTC:-20}
    command: >
      celery -A celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    deploy:
      replicas: 1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
