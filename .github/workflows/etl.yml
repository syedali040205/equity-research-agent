name: ETL Pipeline

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # manual trigger from GitHub UI anytime

jobs:
  run-etl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Init schema + run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          NEWS_INTERVAL_MINUTES: "30"
          FILINGS_HOUR_UTC: "22"
          COMPANIES_HOUR_UTC: "20"
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")

          from db import init_schema
          print("Initializing schema...")
          init_schema()
          print("Schema ready.")

          from tasks.companies import bootstrap_companies
          from tasks.news import run_all as run_news
          from tasks.filings import run_all as run_filings

          print("Bootstrapping companies...")
          bootstrap_companies()

          print("Fetching news...")
          run_news()

          print("Fetching filings...")
          run_filings()

          print("ETL complete.")
          EOF
