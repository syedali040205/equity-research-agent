services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ./worker
    volumes:
      - ./worker:/app
      - beat_data:/app/beat-data
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SEC_USER_AGENT: ${SEC_USER_AGENT}
      NEWS_INTERVAL_MINUTES: ${NEWS_INTERVAL_MINUTES}
      FILINGS_HOUR_UTC: ${FILINGS_HOUR_UTC}
      COMPANIES_HOUR_UTC: ${COMPANIES_HOUR_UTC}
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=4
      -O fair
      -Q realtime,daily,batch,default
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ./worker
    volumes:
      - ./worker:/app
      - beat_data:/app/beat-data
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SEC_USER_AGENT: ${SEC_USER_AGENT}
      NEWS_INTERVAL_MINUTES: ${NEWS_INTERVAL_MINUTES}
      FILINGS_HOUR_UTC: ${FILINGS_HOUR_UTC}
      COMPANIES_HOUR_UTC: ${COMPANIES_HOUR_UTC}
    command: >
      celery -A celery_app beat
      --loglevel=info
      --schedule=/app/beat-data/celerybeat-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    # CRITICAL: never scale this above 1 (would cause duplicate scheduling)
    deploy:
      replicas: 1
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    environment:
      CELERY_BROKER_URL: ${REDIS_URL}
      FLOWER_PORT: ${FLOWER_PORT}
    ports:
      - "${FLOWER_PORT}:${FLOWER_PORT}"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  beat_data:
